name: Update race events

on:
  schedule:
    # 04:00 KST = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update events
        run: node scripts/update-events.js

      - name: Commit changed events
        run: |
          if git diff --quiet -- data/events.json; then
            echo "No event changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git commit -m "Update race events"
          git push
