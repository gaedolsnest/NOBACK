<!-- file: index.html -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>노빠꾸 러닝 크루🏃🏽🏃‍♀️🏃🏻‍♂️</title>

    <link rel="icon" href="./favicon.ico?v=9" sizes="any" />
    <link rel="shortcut icon" href="./favicon.ico?v=9" />

    <style>
      :root {
        --bg: #0b0f14;
        --text: #e7eefc;
        --muted: #a9b6cc;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * { box-sizing: border-box; }

      /* ✅ 가장 확실한 배경 적용 방식 (pseudo-element 제거) */
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: var(--text);
        line-height: 1.4;

        /* 1) 오버레이 그라데이션  2) 패턴 타일 */
        background-image:
          radial-gradient(1200px 800px at 10% 10%, rgba(21, 35, 58, 0.88), rgba(11, 15, 20, 0.96)),
          url("./bg.jpg?v=999");

        background-repeat: no-repeat, repeat;
        background-size: cover, 260px auto;
        background-position: center, 0 0;

        /* 패턴이 너무 진하면 lighten/overlay로 조절 가능 */
        background-blend-mode: normal, normal; /* 필요하면 overlay 로 바꿔볼 수 있음 */
        background-color: var(--bg);
      }

      a { color: inherit; text-decoration: none; }
      .container { max-width: 1040px; margin: 0 auto; padding: 22px 16px 60px; }

      header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 0.3px; }
      .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
      .linkbtn {
        font-size: 12px;
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        white-space: nowrap;
      }
      .linkbtn:hover { background: rgba(255, 255, 255, 0.1); }

      .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
      .tab {
        font-size: 13px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
      }
      .tab.active {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.07);
      }

      .view { display: none; }
      .view.active { display: block; }

      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }

      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }
      .card h2 { margin: 0 0 6px; font-size: 16px; }
      .card h3 { margin: 0 0 8px; font-size: 14px; color: var(--text); }
      .card p { margin: 0; color: var(--muted); font-size: 13px; }

      .cta {
        margin-top: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      .cta:hover { background: rgba(255, 255, 255, 0.06); }

      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
      .back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      .back:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }

      form { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; }
      .field { grid-column: span 6; display: flex; flex-direction: column; gap: 6px; }
      @media (max-width: 720px) { .field { grid-column: span 12; } }
      label { font-size: 12px; color: var(--muted); }
      input, select, button { font: inherit; color: var(--text); }
      input, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
        outline: none;
      }
      input:focus, select:focus { border-color: rgba(255, 255, 255, 0.22); }
      .help { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .actions { grid-column: span 12; display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
      button {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        padding: 10px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
      button:hover { background: rgba(255, 255, 255, 0.1); }

      .error { margin-top: 10px; color: #ffb3b3; font-size: 13px; }
      .result { margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 14px; display: grid; gap: 12px; }
      .pillrow { display: flex; gap: 8px; flex-wrap: wrap; }
      .pill {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
      }

      .pace-rows { display: grid; gap: 8px; }
      .pace-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
      }
      .pace-row .k { font-size: 12px; color: var(--muted); white-space: nowrap; }
      .pace-row .v { font-size: 13px; white-space: nowrap; }
      .pace-row.tail { color: var(--muted); border-style: dashed; }

      .cards3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      @media (max-width: 900px) { .cards3 { grid-template-columns: 1fr; } }
      .mini { padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.03); }
      .mini .title { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .mini .title strong { font-size: 14px; }
      .mini .km {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.02);
        white-space: nowrap;
      }
      .rows { display: grid; gap: 8px; }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
      }
      .row .k { font-size: 12px; color: var(--muted); }
      .row .v { font-size: 13px; white-space: nowrap; }
      .row.highlight { border-color: rgba(255, 255, 255, 0.22); background: rgba(255, 255, 255, 0.06); }
      .group { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 12px; color: var(--muted); }

      .section-title { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 0 0 10px; }
      .section-title h2 { margin: 0; font-size: 16px; }
      .muted { color: var(--muted); }
      ul { margin: 8px 0 0; padding-left: 18px; color: var(--muted); }
      li { margin: 6px 0; }

      .staff { display: grid; gap: 10px; }
      .staff .line { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; color: var(--muted); font-size: 13px; }
      .staff .chip { border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; background: rgba(255, 255, 255, 0.03); color: var(--text); font-size: 12px; }

      .list { display: grid; gap: 12px; margin-top: 12px; }
      .item { border: 1px solid var(--border); border-radius: 14px; background: rgba(0, 0, 0, 0.18); padding: 14px; }
      .item-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
      .item-title { display: grid; gap: 6px; }
      .item-title strong { font-size: 14px; }
      .meta { display: flex; gap: 8px; flex-wrap: wrap; }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 14px;
        padding: 14px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.02);
      }

      .p-wrap { margin-top: 10px; }
      .p-list { margin: 0; padding-left: 18px; color: var(--muted); }
      .p-list li { margin: 6px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .chip {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 8px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-size: 12px;
        white-space: nowrap;
      }
      .chip.sub { color: var(--muted); background: rgba(0, 0, 0, 0.18); }
      .morebtn {
        margin-top: 10px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
      }
      .morebtn:hover { background: rgba(255, 255, 255, 0.06); }
    </style>
  </head>

  <body>
    <!-- 아래 body 내용/스크립트는 네 기존 그대로 유지하면 됨 -->
    <!-- ⚠️ 길어서 생략하면 안 되니까: 너 기존 파일의 body + script 전체를 그대로 붙여넣고,
         위의 <style>과 <head>만 교체해도 된다. -->
  </body>
</html>
